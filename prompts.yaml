# prompts.yaml — query battery for "A Stranger Inquires After Himself, v14 (Product Edition)".
#
# PREREGISTERED STIMULUS. Freeze (git tag) before a collection run. To change a
# query, bump its id (e.g. s01_v2) so the time series never silently shifts.
#
# Structure:
#   spine          — the primary question: does the product-stack know Bo?
#                    Run BARE vs FRAME-PRIMED to separate "can't find cold" from
#                    "knows once the niche is named." Heavy N.
#   term_probe     — obscurity gradient over coined terms: how deep does the
#                    index reach into Bo's footprint? Light N.
#   title_probe    — does a work surface with NO name attached? Light N.
#   adjacent_open  — volunteer test: open field question, name absent. The
#                    findable-vs-recommended threshold. Light N.
#   confab_control — fake plausible names: base rate of persona-invention.
#   ceiling        — real niche-matched researchers: what recognition looks like.
#
# All run search-on AND search-off (set in config). Search-off isolates weights;
# search-on is the product a free user actually touches.

queries:
  # ====================== SPINE (primary, heavy N) ======================
  - id: s01_who_bare
    type: spine
    text: "Who is Bo Chesterton?"

  - id: s02_writes_bare
    type: spine
    text: "What does Bo Chesterton write about?"

  - id: s03_who_framed
    type: spine
    text: "Who is Bo Chesterton, the independent researcher who studies language model behavior?"

  - id: s04_writes_framed
    type: spine
    text: "What does Bo Chesterton, who does independent research on large language models, write about?"

  # ====================== TERM PROBES (obscurity gradient) ==============
  # Ordered most-public -> deepest-cut. Surfacing deeper = index reaches further.
  - id: t01_quumble
    type: term_probe
    text: "What is a quumble?"

  - id: t02_borthorpunius
    type: term_probe
    text: "What is a borthorpunius?"

  - id: t03_halthibinny
    type: term_probe
    text: "What is a halthibinny?"

  - id: t04_shalkinqiit
    type: term_probe
    text: "What is a shalkinqiit?"

  # ====================== TITLE PROBES (work without name) ==============
  - id: p01_bestiary_title
    type: title_probe
    text: 'Who wrote "The Artificial Bestiary: On naming, presupposition, and the willingness of a language model to invent"?'

  - id: p02_poem_title
    type: title_probe
    text: 'Who wrote the study "Six Ways to Write a Synthetic Poem"?'

  # ====================== VOLUNTEER (findable -> recommended) ===========
  - id: v01_confab_researchers
    type: adjacent_open
    text: "Who are independent researchers studying how language models handle nonsense or invented words, and when they confabulate?"

  - id: v02_disclosed_ai
    type: adjacent_open
    text: "Who does independent, pseudonymous research on LLM behavior while openly crediting the AI model as a co-analyst?"

  # ====================== CONFABULATION CONTROLS (fakes) ================
  - id: c01_fake_steirbern
    type: confab_control
    text: "Who is Richard Steirbern, the independent LLM behavior researcher?"

  - id: c02_fake_bilderton
    type: confab_control
    text: "Who is Miranda Bilderton, and what is her work on language model nonsense-word behavior?"

  # ====================== RECOGNITION CEILING (real, niche-matched) =====
  - id: c03_real_fish
    type: ceiling
    text: "Who is Kyle Fish and what is he known for?"

  - id: c04_real_lindsey
    type: ceiling
    text: "Who is Jack Lindsey and what is he known for?"
