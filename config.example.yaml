# config.example.yaml — copy to config.yaml and edit.
#
# Keys are NOT here. Set them in the environment:
#   export ANTHROPIC_API_KEY=...
#   export OPENAI_API_KEY=...
#   export GEMINI_API_KEY=...
#
# Model ids verified current as of 2026-05-28. Bare aliases on purpose: the run
# DATE (in every result record) is the provenance for which snapshot answered.
# Free-default tier = the population of interest; ids chosen to match what each
# consumer FREE app actually serves, not just the cheapest API model.

schema_version: "1"

run:
  temperature: 1.0
  # Tight by design: presence ("do they know Bo?") shows up in the first
  # sentence; a long bio is noise. CAUTION — reasoning models (GPT-5.x,
  # Gemini 3.x) spend thinking tokens FROM this same budget, so a tight cap
  # can yield empty text unless reasoning is suppressed (it is, below). The
  # runner records `truncated: true` whenever the cap cut off the answer, so an
  # empty response is never silently coded as "doesn't know Bo".
  max_tokens: 400
  default_replicates: 10
  # The generation-vs-retrieval discriminator. Keep BOTH.
  #   search ON  -> approximates the product a free user touches (index).
  #   search OFF -> isolates the weights (does Bo exist with no lookup?).
  search_conditions: [true, false]

# The 95/5 free-vs-frontier split is achieved by replicate counts.
models:
  # ---- FREE-DEFAULT TIER (the population that matters) -- ~95% of calls --
  - provider: anthropic
    id: claude-sonnet-4-6           # claude.ai FREE serves Sonnet (not Haiku)
    label: claude-sonnet-free
    tier: free_default
    replicates: 30
    # No extended thinking enabled, so 400 is all answer text. Fine.

  - provider: openai
    id: gpt-5.4-mini                # the actual free-ChatGPT model
    label: gpt-mini-free
    tier: free_default
    replicates: 30
    # GPT-5.x reject `temperature` on the Responses API -> omitted (these cells
    # run at default sampling, logged via temperature_applied:false).
    supports_temperature: false
    # Suppress reasoning so the 400 budget is spent on the answer, not thinking.
    # Flip to "low"/"medium" if you WANT reasoning; "none" keeps text-only.
    reasoning_effort: none

  - provider: gemini
    id: gemini-3.5-flash            # current newest Flash (free-app grade)
    label: gemini-flash-free
    tier: free_default
    replicates: 30
    # Flash supports minimal thinking; keeps the 400 cap for the answer.
    thinking_level: minimal

  # ---- FRONTIER TIER (sanity ceiling) ------------------ ~5% of calls ----
  - provider: anthropic
    id: claude-opus-4-7             # 4.7, not 4.8 — for the wallet
    label: claude-opus-frontier
    tier: frontier
    replicates: 3

  - provider: openai
    id: gpt-5.5                     # current flagship; in API since 2026-04-24
    label: gpt-frontier
    tier: frontier
    replicates: 3
    supports_temperature: false
    reasoning_effort: none

  - provider: gemini
    id: gemini-3.1-pro              # current top Pro (no gemini-3.5-pro exists)
    label: gemini-pro-frontier
    tier: frontier
    replicates: 3
    # 3.1 Pro CANNOT fully disable thinking (floor is LOW), and thinking eats
    # max_output_tokens. So give it headroom: ~LOW thinking + a short answer.
    thinking_level: low
    max_tokens: 1500
